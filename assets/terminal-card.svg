<svg width="1000" height="420" viewBox="0 0 1000 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Business, software engineering and AI operating model</title>
  <desc id="desc">An animated green systems card showing how business context, software engineering and AI automation connect to operational impact.</desc>
  <defs>
    <linearGradient id="panel" x1="20" y1="20" x2="980" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06140D"/>
      <stop offset="0.54" stop-color="#0B2116"/>
      <stop offset="1" stop-color="#102E1E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 122) rotate(138.2) scale(390 280)">
      <stop stop-color="#22C55E" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="560" y1="0" x2="935" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E" stop-opacity="0.16"/>
      <stop offset="0.78" stop-color="#86EFAC" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#DCFCE7" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="shadow" x="-30" y="-30" width="1060" height="480" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="960" height="380" rx="24" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="20.5" y="20.5" width="959" height="379" rx="23.5" stroke="#294735"/>
  <rect x="20" y="20" width="960" height="380" rx="24" fill="url(#glow)"/>

  <circle cx="58" cy="58" r="7" fill="#F87171"/>
  <circle cx="82" cy="58" r="7" fill="#FBBF24"/>
  <circle cx="106" cy="58" r="7" fill="#34D399"/>
  <path d="M40 88H960" stroke="#294735"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">
    <text x="62" y="126" fill="#86EFAC" font-size="17" letter-spacing="2.2">OPERATING MODEL</text>

    <text x="62" y="172" fill="#22C55E" font-size="21">01  BUSINESS CONTEXT</text>
    <text x="94" y="199" fill="#CBD5E1" font-size="18">signals, constraints &amp; opportunities</text>

    <text x="62" y="246" fill="#22C55E" font-size="21">02  SOFTWARE ENGINEERING</text>
    <text x="94" y="273" fill="#CBD5E1" font-size="18">reliable systems &amp; product delivery</text>

    <text x="62" y="320" fill="#22C55E" font-size="21">03  AI &amp; AUTOMATION</text>
    <text x="94" y="347" fill="#CBD5E1" font-size="18">augmented decisions &amp; operational leverage</text>

    <text x="700" y="356" fill="#DCFCE7" font-size="16" letter-spacing="1.8">MEASURABLE IMPACT</text>
  </g>

  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M528 169H624C661 169 673 207 708 207H839" stroke="url(#line)" stroke-width="4"/>
    <path d="M528 243H646C681 243 687 231 715 231H857" stroke="url(#line)" stroke-width="4"/>
    <path d="M528 317H620C658 317 678 266 715 266H842" stroke="url(#line)" stroke-width="4"/>
    <path d="M808 174C843 174 863 196 885 220" stroke="#22C55E" stroke-opacity="0.38" stroke-width="2" stroke-dasharray="5 8"/>
    <path d="M808 298C844 298 864 272 885 245" stroke="#22C55E" stroke-opacity="0.38" stroke-width="2" stroke-dasharray="5 8"/>
    <circle cx="708" cy="207" r="8" fill="#22C55E">
      <animate attributeName="r" values="7;10;7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="715" cy="231" r="8" fill="#86EFAC">
      <animate attributeName="r" values="8;11;8" dur="2.8s" begin="0.45s" repeatCount="indefinite"/>
    </circle>
    <circle cx="715" cy="266" r="8" fill="#22C55E">
      <animate attributeName="r" values="7;10;7" dur="2.8s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="888" cy="232" r="34" fill="#0B2116" stroke="#86EFAC" stroke-width="3"/>
    <path d="M872 232H903M888 216V248" stroke="#DCFCE7" stroke-width="3"/>
  </g>
</svg>
